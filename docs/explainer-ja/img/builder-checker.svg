<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 320">
  <defs>
    <marker id="arrow-blue" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto" markerUnits="strokeWidth">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#3b82f6"/>
    </marker>
    <style>
      text { font-family: 'Hiragino Sans','Noto Sans JP','Yu Gothic',system-ui,sans-serif; fill: #1e293b; }
      .title { font-size: 23px; font-weight: 700; }
      .body { font-size: 17px; }
      .small { font-size: 15px; fill: #64748b; }
      .label { font-size: 16px; font-weight: 700; }
      .icon { font-size: 52px; }
      .line { stroke-width: 2.5; stroke-linecap: round; stroke-linejoin: round; fill: none; }
    </style>
  </defs>

  <rect x="10" y="10" width="880" height="300" rx="18" fill="#f8fafc"/>

  <text x="450" y="48" text-anchor="middle" class="title">作る人と、粗探しする人を分ける</text>
  <text x="450" y="76" text-anchor="middle" class="small">同じ一人だと自分の見落としに気づけない。役を分けると盲点が通りにくい</text>

  <g transform="translate(92 112)">
    <rect x="0" y="0" width="202" height="126" rx="12" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
    <text x="56" y="60" text-anchor="middle" class="icon">🤖</text>
    <rect x="116" y="30" width="58" height="72" rx="7" fill="#ffffff" stroke="#3b82f6" stroke-width="2"/>
    <line x1="129" y1="50" x2="162" y2="50" stroke="#64748b" stroke-width="2" stroke-linecap="round"/>
    <line x1="129" y1="68" x2="158" y2="68" stroke="#64748b" stroke-width="2" stroke-linecap="round"/>
    <path d="M 82 76 Q 100 94 116 82" class="line" stroke="#3b82f6"/>
    <text x="101" y="111" text-anchor="middle" class="label">つくる AI</text>
  </g>

  <path d="M 320 174 H 552" class="line" stroke="#3b82f6" marker-end="url(#arrow-blue)"/>
  <rect x="376" y="143" width="120" height="34" rx="17" fill="#dbeafe"/>
  <text x="436" y="166" text-anchor="middle" class="label">成果物を渡す</text>

  <g transform="translate(606 112)">
    <rect x="0" y="0" width="222" height="126" rx="12" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
    <text x="111" y="61" text-anchor="middle" class="icon">🕵️</text>
    <rect x="80" y="72" width="62" height="28" rx="6" fill="#ffffff" stroke="#22c55e" stroke-width="2"/>
    <text x="111" y="92" text-anchor="middle" class="small" font-weight="700">粗探し</text>
    <text x="111" y="116" text-anchor="middle" class="label">検品する AI（別の役）</text>
  </g>

  <g transform="translate(105 262)">
    <rect x="0" y="0" width="690" height="34" rx="12" fill="#fef3c7" stroke="#f59e0b" stroke-width="2"/>
    <text x="345" y="23" text-anchor="middle" class="small">※どちらも同じ系統の AI なので“完全に独立”ではない（後述の限界）</text>
  </g>
</svg>
